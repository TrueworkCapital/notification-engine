name: Event Ingestion Pipeline

on:
  schedule:
    # Runs every day at 8:30 AM IST (3:00 AM UTC)
    - cron: "0 3 * * *"

  # Allow manual trigger from GitHub UI (for testing)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Job 1: Scrape and Email ───────────────────────────────
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run SEBI Reg 30 Scraper
        env:
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL:  ${{ secrets.RECEIVER_EMAIL }}
          CC_EMAILS:       ${{ secrets.CC_EMAILS }}
          GH_TOKEN:        ${{ secrets.GH_TOKEN }}
          GH_REPO:         ${{ secrets.GH_REPO }}
        run: python ingestion_service.py

      - name: Ensure pdfs directory exists
        if: always()
        run: mkdir -p pdfs

      - name: Upload PDFs as artifact (7-day backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sebi-reg30-pdfs-${{ github.run_id }}
          path: pdfs/
          retention-days: 7
          if-no-files-found: ignore

  # ── Job 2: Delete old releases keeping last 5 ────────────
  cleanup:
    runs-on: ubuntu-latest
    needs: scrape
    if: always()

    steps:
      - name: Keep last 5 releases, delete the rest
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO:  ${{ secrets.GH_REPO }}
        run: |
          python3 - << 'EOF'
          import os
          import requests
          from datetime import datetime, timezone

          GH_TOKEN = os.environ["GH_TOKEN"]
          GH_REPO  = os.environ["GH_REPO"]

          headers = {
              "Authorization": f"token {GH_TOKEN}",
              "Accept": "application/vnd.github.v3+json",
          }

          # How many recent releases to keep
          # 5 covers a full week including weekends and public holidays
          # e.g. Monday's file is safe even though Friday's is 3 days old
          KEEP_LAST_N = 5

          print(f"🗑️  Keeping last {KEEP_LAST_N} releases, deleting the rest...")

          # Get all releases
          resp = requests.get(
              f"https://api.github.com/repos/{GH_REPO}/releases",
              headers=headers,
              params={"per_page": 100}
          )
          releases = resp.json()

          if not isinstance(releases, list):
              print(f"No releases found or API error: {releases}")
              exit(0)

          if len(releases) == 0:
              print("No releases found. Nothing to delete.")
              exit(0)

          # Sort by created_at descending (newest first)
          releases.sort(
              key=lambda r: datetime.fromisoformat(
                  r["created_at"].replace("Z", "+00:00")
              ),
              reverse=True
          )

          print(f"📋 Found {len(releases)} total release(s)\n")

          deleted = 0
          for index, release in enumerate(releases):
              release_name = release["name"]
              release_id   = release["id"]
              tag_name     = release["tag_name"]
              created_at   = datetime.fromisoformat(
                  release["created_at"].replace("Z", "+00:00")
              )
              age_in_days = (datetime.now(timezone.utc) - created_at).days

              # Keep the most recent KEEP_LAST_N releases
              if index < KEEP_LAST_N:
                  print(f"   ⏭️  Keeping [{index + 1}/{KEEP_LAST_N}]: {release_name} ({age_in_days} day(s) old)")
                  continue

              # Delete the release
              del_resp = requests.delete(
                  f"https://api.github.com/repos/{GH_REPO}/releases/{release_id}",
                  headers=headers
              )
              if del_resp.status_code == 204:
                  print(f"   ✅ Deleted release: {release_name} ({age_in_days} days old)")
              else:
                  print(f"   ❌ Failed to delete: {release_name} — {del_resp.status_code}")
                  continue

              # Delete the tag
              tag_resp = requests.delete(
                  f"https://api.github.com/repos/{GH_REPO}/git/refs/tags/{tag_name}",
                  headers=headers
              )
              if tag_resp.status_code == 204:
                  print(f"   🏷️  Deleted tag: {tag_name}")
              else:
                  print(f"   ⚠️  Could not delete tag: {tag_name} — {tag_resp.status_code}")

              deleted += 1

          print(f"\n✅ Cleanup done. {deleted} old release(s) deleted.")
          EOF