name: Event Ingestion Pipeline

on:
  schedule:
    # Runs every day at 9:00 AM IST (3:30 AM UTC)
    - cron: "30 3 * * *"

  # Allow manual trigger from GitHub UI (for testing)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Job 1: Scrape and Email ───────────────────────────────
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run SEBI Reg 30 Scraper
        env:
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL:  ${{ secrets.RECEIVER_EMAIL }}
          GH_TOKEN:        ${{ secrets.GH_TOKEN }}
          GH_REPO:         ${{ secrets.GH_REPO }}
          CC_EMAILS:       ${{ secrets.CC_EMAILS }}
        run: python ingestion_service.py

      - name: Ensure pdfs directory exists
        if: always()
        run: mkdir -p pdfs

      - name: Upload PDFs as artifact (7-day backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sebi-reg30-pdfs-${{ github.run_id }}
          path: pdfs/
          retention-days: 7
          if-no-files-found: ignore

  # ── Job 2: Delete Releases older than 3 days ─────────────
  cleanup:
    runs-on: ubuntu-latest
    needs: scrape
    if: always()

    steps:
      - name: Delete GitHub Releases older than 3 days
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO:  ${{ secrets.GH_REPO }}
        run: |
          python3 - << 'EOF'
          import os
          import requests
          from datetime import datetime, timedelta, timezone

          GH_TOKEN = os.environ["GH_TOKEN"]
          GH_REPO  = os.environ["GH_REPO"]

          headers = {
              "Authorization": f"token {GH_TOKEN}",
              "Accept": "application/vnd.github.v3+json",
          }

          cutoff = datetime.now(timezone.utc) - timedelta(days=3)
          print(f"🗑️  Deleting releases older than {cutoff.strftime('%Y-%m-%d')}...")

          # Get all releases
          resp = requests.get(
              f"https://api.github.com/repos/{GH_REPO}/releases",
              headers=headers,
              params={"per_page": 100}
          )
          releases = resp.json()

          if not isinstance(releases, list):
              print(f"No releases found or API error: {releases}")
              exit(0)

          deleted = 0
          for release in releases:
              created_at = datetime.fromisoformat(
                  release["created_at"].replace("Z", "+00:00")
              )
              if created_at < cutoff:
                  release_id   = release["id"]
                  release_name = release["name"]
                  tag_name     = release["tag_name"]

                  # Delete the release
                  del_resp = requests.delete(
                      f"https://api.github.com/repos/{GH_REPO}/releases/{release_id}",
                      headers=headers
                  )
                  if del_resp.status_code == 204:
                      print(f"   ✅ Deleted release: {release_name}")
                  else:
                      print(f"   ❌ Failed to delete release: {release_name}")
                      continue

                  # Also delete the tag
                  tag_resp = requests.delete(
                      f"https://api.github.com/repos/{GH_REPO}/git/refs/tags/{tag_name}",
                      headers=headers
                  )
                  if tag_resp.status_code == 204:
                      print(f"   🏷️  Deleted tag: {tag_name}")

                  deleted += 1

          print(f"\n✅ Cleanup done. {deleted} old release(s) deleted.")
          EOF